<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bubbleplot</title>
  <link rel="stylesheet" href="added_style.css">
  
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/highcharts-more.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <script src="https://code.highcharts.com/modules/export-data.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  <script src="https://code.highcharts.com/themes/adaptive.js"></script>
  <script src="https://code.highcharts.com/modules/coloraxis.js"></script>

  <!-- your existing head content -->
  <style>
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }
  </style>

</head>

<body>

  <!-- align-items:stretch makes both children the same height -->
  <div style="display:flex; align-items:stretch; gap:0; padding:16px;">

    <!-- Chart -->
    <div id="container" class="highcharts-light" style="flex:1;"></div>

    <!-- Legend styled to match the Highcharts box -->
    <div id="custom-legend" style="
    flex-shrink: 0;
    width: 200px;
    padding-top: 80px;
    padding-left: 8px;
    padding-right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: 'Lucida Grande', 'Lucida Sans Unicode', Arial, Helvetica, sans-serif;
    font-size: 12px;
    background-color: #ffffff;
    border: 1px solid #e6e6e6;
    border-left: none;
    box-sizing: border-box;
  "></div>

  </div>

  <script src="script.js"></script>

</body>
  
</html>
