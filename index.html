<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bubbleplot</title>
  <link rel="stylesheet" href="added_style.css">
  
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/highcharts-more.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <script src="https://code.highcharts.com/modules/export-data.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  <script src="https://code.highcharts.com/themes/adaptive.js"></script>
  <script src="https://code.highcharts.com/modules/coloraxis.js"></script>

  <!-- your existing head content -->
  <style>
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }
  </style>

</head>

<body>

  <!-- Flex wrapper: chart + legend side by side -->
  <div style="display:flex; align-items:flex-start; gap:16px; padding:16px;">

    <!-- Chart takes up remaining space -->
    <div id="container" class="highcharts-light" style="flex:1; height:600px;"></div>

    <!-- Custom legend: fixed width, pushed down to clear the chart title area -->
    <div id="custom-legend" style="
      flex-shrink: 0;
      width: 200px;
      padding-top: 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-family: sans-serif;
      font-size: 13px;
    "></div>

  </div>

  <script src="script.js"></script>

</body>
  
</html>
