<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bubbleplot</title>
  <link rel="stylesheet" href="added_style.css">
  
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/highcharts-more.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <script src="https://code.highcharts.com/modules/export-data.js"></script>
  <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  <script src="https://code.highcharts.com/themes/adaptive.js"></script>
  <script src="https://code.highcharts.com/modules/coloraxis.js"></script>

  <style>
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>

  <div style="display: flex; flex-direction: column; gap: 0; padding: 16px;">

    <!-- Chart -->
    <div id="container" class="highcharts-light" style="width: 100%;"></div>

    <!-- Legend below chart, 2–3 columns -->
    <div id="custom-legend" style="
      width: 100%;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: repeat(3, auto);
      justify-content: start;
      gap: 8px 24px;
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', Arial, Helvetica, sans-serif;
      font-size: 12px;
      background-color: #ffffff;
      border-top: none;
      box-sizing: border-box;
    "></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
